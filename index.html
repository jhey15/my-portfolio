<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }body {
        line-height: 1.6;
        background: #f4f6f9;
        color: #333;
    }

    header {
        background: #0f172a;
        color: #fff;
        padding: 20px 0;
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .container {
        width: 90%;
        max-width: 1100px;
        margin: auto;
    }

    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    nav h1 {
        font-size: 22px;
        font-weight: 600;
    }

    nav ul {
        list-style: none;
        display: flex;
        gap: 20px;
    }

    nav ul li a {
        text-decoration: none;
        color: #fff;
        font-weight: 400;
        transition: 0.3s;
    }

    nav ul li a:hover {
        color: #38bdf8;
    }

    .hero {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        background: linear-gradient(to right, #0f172a, #1e293b);
        color: white;
        padding: 40px 20px;
    }

    .hero h2 {
        font-size: 40px;
        margin-bottom: 15px;
    }

    .hero p {
        font-size: 18px;
        max-width: 600px;
        margin: auto;
        opacity: 0.9;
    }

    section {
        padding: 70px 0;
    }

    section h2 {
        text-align: center;
        margin-bottom: 40px;
        font-size: 30px;
        color: #0f172a;
    }

    .about {
        text-align: center;
        max-width: 700px;
        margin: auto;
    }

    .projects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
    }

    .project-card {
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        transition: 0.3s ease;
    }

    .project-card:hover {
        transform: translateY(-5px);
    }

    .project-card h3 {
        margin-bottom: 10px;
        color: #0f172a;
    }

    .contact-info {
        text-align: center;

		const age = 16;
		console.log("Hello,world!")
		alert(name);
		alert(age);
	</script>
</body>
</html>
